<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cards with Icons</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        background-color: slategray;
        color: burlywood;
        font-family: Georgia, "Times New Roman", Times, serif;
        line-height: 1.5;
      }
      h1,
      h2 {
        text-align: center;
      }
      .fbcards {
        background-color: cornsilk;
        border: 2px solid black;
        padding: 1rem;
        max-width: 1200px;
        margin: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .cardcircle {
        background-color: dimgray;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5rem;
        margin: auto;
        border: 2px solid black;
      }
      .card {
        background-color: slategray;
        border: 2px solid black;
        padding: 1rem;
        text-align: center;
        border-radius: 5px;
      }
      @media screen and (min-width: 700px) {
        .fbcards {
          flex-direction: row;
        }
      }
    </style>
  </head>
  <body>
    <h1>Cards with Icons</h1>
    <h2>Font Awesome</h2>
    <section class="fbcards">
      <article class="card">
        <div class="cardcircle">
          <i class="fa-solid fa-shield-dog"></i>
        </div>
        <h3>Card Header</h3>
        <p>

        </p>
      </article>
      <article class="card">

          <i class="fa-solid fa-shield-dog"></i>
        </div>
        <h3>Card Header</h3>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Omnis, enim!
        </p>
      </article>
      <article class="card">
        <div class="cardcircle">
          <i class="fa-solid fa-shield-dog"></i>
        </div>
        <h3>Card Header</h3>
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Omnis, enim!
        </p>
      </article>
    </section>
  </body>
</html>
